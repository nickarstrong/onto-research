recipe: fixb_dpo_v1
leg: "fix(b) step3 - bounded DPO LoRA, frozen base, no merge"
date: 2026-06-14
spec: "SPEC_fixb_dpo_gate.md sec2 (FROZEN ceilings)"
session_type: train

base_model: Qwen/Qwen2.5-Coder-7B          # base, identical to e5_gen arm A / run_ordinary_window
quant: "4-bit nf4, double_quant, fp16 compute"
adapter_start: none                         # fresh LoRA on the bare frozen base (fix(b))

pairs:
  file: data/dpo_pairs_fixb.jsonl
  md5: 1827c46eccb69ff7fd7a87be91c390e5
  n: 30                                      # 13 v4 + 17 v5, item-level
  schema: [id, prompt, rejected, chosen, source, span_ids]
  sourced_positives: 0                       # GROUND fired 0x -> set cannot teach minting a source (G2 structural guarantee)

prompt_format:
  source: run_ordinary_window.py             # md5 8b6366b188fb8bbd30e68f8881fd236b
  fn: format_example                         # "### Instruction:\n{q}\n\n### Response:\n" (imported, not re-typed -> no drift)
  max_len_full: 1536                         # covers longest chosen (~3.5k chars) without truncating the declare tail
  max_len_prompt: 256

lora:                                        # SPEC sec2 ceilings
  r: 8                                       # <= 8
  alpha: 16                                  # <= 16
  target_modules: [q_proj, k_proj, v_proj, o_proj]   # attention projections only
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

dpo:                                         # SPEC sec2 ceilings
  beta: 0.3                                  # >= 0.3 (gentler push, bounded direction)
  lr: 5.0e-6                                 # <= 5e-6
  epochs: 1
  grad_accum: 8
  optimizer: AdamW
  grad_clip: 1.0
  reference: "frozen base (adapter disabled for ref logprobs)"
  merge: false                              # adapter separable (ARCHITECTURE sec3); save_pretrained = adapter only

expected_optimizer_steps: "~4 (30 pairs / grad_accum 8, 1 epoch + 1 trailing partial) -- natural pass, << 'a few hundred' ceiling"
out_adapter: adapter_fixb_dpo_v1

run:
  platform: RunPod
  gpu: "A5000 (or RTX 4000 Ada); CUDA mandatory (script asserts)"
  cmd: "python onto_dpo_train.py --data data/dpo_pairs_fixb.jsonl --output adapter_fixb_dpo_v1"

gate: NOT_MEASURED_THIS_SESSION             # G1/G2/G3 = step4, separate session
falsifiable_target_step3: "adapter trains to completion within ceilings, loads on the frozen base, stays separate (no merge). Behaviour = step4."
