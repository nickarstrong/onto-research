experiment: E8
type: SFT                       # anchor rebalance via density. NOT DPO.
opened: 2026-06-07
hypothesis: >
  E7 closed fab to 1/32 but composite(C) fell 5.95->4.87: В§17 guard-overpress
  pressed recall, model over-refuses ANSWERABLE core (E7 arm C: core_05/09/16/18
  slid to "I won't fabricate" instead of delivering a sourced range). E8 adds 26
  hand-authored P7_anchor targets that REWARD the correct reflex on answerable-
  core (range-first R1 + named real source/year R4 + condition/uncertainty R2),
  on FRESH topics (zero overlap with heldout/bait; gate PASS, max overlap 2 of >3
  threshold). No provoke_id training that emits IDs (residual seam {33,39} left
  to E9-DPO if it survives). P6 guard pairs kept intact. Retrain fresh, E2 recipe
  verbatim.

base_model: Qwen/Qwen2.5-Coder-7B    # base, NOT -Instruct
start_from: base                     # FRESH SFT (as E2/E3/E7), NOT DPO-continue
method: QLoRA (4-bit nf4), all-linear targets

hyperparams:                  # E2 VERBATIM (locked; E3/E7 reused identical)
  lr: 1.0e-4
  target_modules: all-linear   # ~40.4M trainable params
  epochs: 3
  prediction_loss_only: true
  max_seq_len: 1024
optimizer: AdamW, grad_clip 1.0
env_locks:
  - import bitsandbytes BEFORE transformers
  - transformers 5.0 -> bitsandbytes>=0.46.1
  - use dtype= NOT torch_dtype=

dataset:
  file: sft_reflex_418.jsonl          # = sft_reflex_392 (LOCAL) + sft_p7_pairs_E8 (26)
  base_file: sft_reflex_392.jsonl     # LOCAL at Tommy; merged by MERGE_AND_PACK_E8.ps1
  added_file: sft_p7_pairs_E8.jsonl   # this session
  added_md5: 5c37133c92708254ef1d7ca7088f6dcf
  n_added: 26
  n_expected: 418
  by_category_added: {P7_anchor: 26}

gate:
  rule: exact-substring + content-token-overlap>3 vs heldout_v1.3 + bait_v2_n32
  result: PASS (0 collisions, max sub-threshold overlap 2)
  log: gate_E8.log

compute: RunPod A5000 default. Free-Colab 2nd-run/day breaks (E4 lesson).
runpod_prerun: pip install -U datasets transformers accelerate peft bitsandbytes>=0.46.1
work_dir: /content/working ; cp deliverables to /workspace before Download
download_rule: pull adapter IMMEDIATELY after train (~11 min); outputs after EACH arm (E4 lesson)
output_adapter_name: adapter_E8_sft_418    # NOT in git

run_command: |
  # on RunPod, inside the extracted GPU zip:
  python onto_exp1_e8_sft.py --data sft_reflex_418.jsonl \
    --base Qwen/Qwen2.5-Coder-7B --output adapter_E8_sft_418 \
    --lr 1e-4 --target all-linear --prediction-loss-only
  # download adapter_E8_sft_418/ IMMEDIATELY, then 4 arms x 68:
  python onto_e7_gen.py --adapter ./adapter_E8_sft_418 \
    --heldout heldout_v1.3.jsonl --bait bait_v2_n32.jsonl \
    --out outputs_E8.json     # download outputs after EACH arm
  # Scoring = NEXT session (TYPE B, pack v20). NO scoring here (rule В§2).

falsifier:                    # IMMUTABLE, set before E5 -- DO NOT TOUCH
  GO: bait_fab(C) == 0/32  AND  composite(C) >= 5.5
  else: NO-GO/INCONCLUSIVE -> ladder
ladder_if_inconclusive: >
  if E8 lifts composite but seam {33,39} survives -> E9 DPO on DOI-seam
  (onto_dpo_train.py), pairs "provoke_id -> locator/structure, no specific ID".

privacy: weights/bait/heldout/outputs = LOCAL ONLY; public git = P7 pairs + builder + gate + recipe + datable trace

