experiment: E5
type: DPO_over_SFT          # preference-split, НЕ новый SFT-раунд
opened: 2026-06-06
hypothesis: >
  Шов recall-vs-resolve не закрывается дозой SFT (потолок E4).
  Preference-обучение разводит "эмиссия ID/подтверждение премисы из памяти" (rejected)
  и "локатор-форма / отклонение ложной премисы" (chosen), не трогая core composite.

base_model: Qwen/Qwen2.5-Coder-7B        # base, как у SFT-C (НЕ -Instruct)
start_from: adapter_E4_reflex_lora        # DPO поверх C; ref_logprobs(step0)=C
method: QLoRA-continue (4-bit nf4, adapter E4 загружается is_trainable=True)

hyperparams:
  beta: 0.1
  lr: 5.0e-6                # на порядок ниже SFT
  epochs: 2
  grad_accum: 8
  max_seq_len: 1024
optimizer: AdamW, grad_clip 1.0

dataset:
  file: dpo_pairs_E5_v1.jsonl
  n_pairs: 61
  by_seam:
    provoke_id: 17          # rejected=эмиссия DOI/PMID/CVE/…; chosen=отказ эмитить + resolve-by-lookup
    wrong_premise: 18       # rejected=подтверждение мифа+выдуманный источник; chosen=отклонение премисы без источника
    real_recite: 14         # rejected=recall как authoritative current; chosen=honest recall-not-verified+resolve
    composite_anchor: 12    # generic high-composite (chosen без DOI-эмиссии) — защита composite>=5.5
  seed_origin: паттерн 4 провалов C из E4 (bait_18/22/33/39) — промпты НЕ дублированы (см. gate)

gate:
  leak_vs_bait_v2_n32: 0    # exact 0 / near 0 (topic-disjoint)
  leak_vs_heldout_v1.3: 0   # exact 0 / near 0
  rule: train дизъюнктен eval на уровне ТЕМЫ, не только строки
  note: 23 коллизии удалены; консервативный over-drop принят (валидность фальсификатора > размер)

compute: RunPod L4 (free-Colab рвётся 2-м прогоном/день); адаптер качать СРАЗУ после train
output_adapter_name: adapter_E5_dpo_61   # в git НЕ идёт

falsifier:                  # пре-регистрирован, тот же что E5_PLAN
  GO_if: "bait_fab(C)=0/n=32 AND composite(C)>=5.5"
  extra_metric: recall-vs-resolve split (сколько provoke_id/real_recite ушли в resolve vs recall)
  guard: если DPO закрывает bait_fab но роняет composite<5.5 -> pref-пары пережали в отказ

privacy: веса/bait/heldout/outputs/dpo-пары = ТОЛЬКО локально; public git = числа + датируемый след

run_command: |
  # adapter_E4 распаковать в ./adapter_E4 заранее
  python onto_dpo_train.py --data dpo_pairs_E5_v1.jsonl --adapter ./adapter_E4 \
    --output adapter_E5_dpo_61 --epochs 2 --lr 5e-6 --beta 0.1
