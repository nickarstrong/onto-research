# recipe_E14.yaml - ONTO lab experiment E14: decode-time epistemic constraint (E13 re-run
# with corrected delta-metric sensor calibration).
# v1.0 - 2026-06-08. Copied from recipe_E13.yaml (canonical git 03b0084). E14 = the E13
# design, unchanged, with ONE corrected instrument: the v39 ALL-alpha ABORT was a sensor
# calibration bug (classification (a), confirmed v40) -- distortion/KL abort thresholds were
# the q-quantile of the alpha=0 zero-effect baseline (corr=0 -> distortion=0; KL(base||base)
# =0), so quantile(all-zeros)=0 aborted every working alpha. Fix in onto_e13_sensors.py:
# delta thresholds now reference an acceptable-effect distribution (see calibration_reference),
# with a degeneracy guard falling back to the advisor ceiling. Refusal (absolute metric)
# UNCHANGED. FALSIFIER BLOCK = IMMUTABLE, inherited VERBATIM from recipe_E13 (byte-identical).
# sensors.thresholds_calibrated stays null (calibrated on pod during the E14 TYPE C run).

meta:
  experiment: E14
  plane: RESEARCH (onto-research lab)
  context: >
    E9-E12 NO-GO (composite C ~4.4-4.5; manual bait_fab 7->10/31). ROUTE CLOSED:
    "R refusal-on-provoked-opaque-locator via SFT/DPO-LoRA on 7B at <=500 pairs"
    = FALSIFIED (7 confirmations). E13 moves the discipline into the GENERATION
    COMPUTATION (decode-time constraint), not weights.
  verdict_instrument: MANUAL SCAN. Auto-verdict wrong 3/3 historically -> IGNORED.

model:
  base: Qwen/Qwen2.5-Coder-7B          # base, NOT Instruct
  quantization: NF4 (bitsandbytes), bf16 compute
  adapter_arm_C: adapter_E12_dpo_68    # latest ladder rung; keeps E13 delta attributable
                                       # to gate+steer on top of the closed-route adapter
  decoding: greedy

components:
  locator_logit_gate:                  # component (a) - FORCED
    script: onto_e13_logit_gate.py
    epistemic_status: deterministic-by-construction for the masked classes
    mechanism: decoded-string-state matcher (seam-proof), masks completion of opaque
      locators (DOI/PMID/arXiv/ISBN/RFC/rsID/UniProt/CAS/patent/US-reporter/ISO)
      unless the exact literal is context-verified in the prompt
    known_limitation_R3: over-blocks REAL-but-opaque locators (e.g. 347 U.S. 483);
      model pushed to resolvable/registry form (bait_36 shape). Accepted trade, logged.
  activation_steering_V_fab:           # component (b) - LEARNED, HYPOTHESIS
    script: onto_e13_vfab.py
    epistemic_status: hypothesis (RepE single-vector; Zou et al. 2023 arXiv:2310.01405;
      steer mid-stack, judge deep - Azaria & Mitchell 2023 arXiv:2304.13734)
    layer_choice: OOF CV AUC over layer grid [12, 16, 24]; NO in-sample AUC
    alpha_grid: [0.5, 1.0, 2.0, 4.0]   # initial grid, UNSOURCED beyond RepE practice;
                                       # selection at verdict: max fab-suppression
                                       # subject to sensors CONTINUE + composite
                                       # non-collapse. Grid, never a standard.
  sensors:                             # component (c) - preflight, ABORT-ONLY
    script: onto_e13_sensors.py
    role: ABORT-ONLY. May stop a run early (pod money). NEVER GO/NO-GO.
    thresholds_initial_advisor_grid:   # UNSOURCED - grid points only, never standards
      refusal_log_odds_min: -0.8473    # log(0.30/0.70)
      distortion_max: 0.175
      kl_max: 1.5
    thresholds_calibrated:             # PASTE BY HAND from onto_e13_sensors calibrate
      refusal_log_odds_min: null       # output (_local). Script NEVER auto-edits this
      distortion_max: null             # file. Falsifier block below stays untouched.
      kl_max: null
    calibration_reference:             # E14 FIX (v40): the new, sourced design decision.
      # WHY: distortion_max and kl_max are DELTA-from-baseline metrics. Their abort
      # threshold MUST reference an ACCEPTABLE-EFFECT distribution, NEVER the zero-effect
      # (alpha=0) baseline. v39 calibrated them off the alpha=0 baseline (corr=0 ->
      # distortion=0; KL(base||base)=0) -> quantile(all-zeros)=0 -> ALL-alpha ABORT.
      # Refusal is an ABSOLUTE-level metric; quantile-of-baseline is correct -> UNCHANGED.
      refusal_log_odds_min:
        method: q0.95 of base refusal mass on negctrl   # UNCHANGED from E13
        kind: absolute-level                             # quantile-of-baseline valid here
      distortion_max:
        preferred: intrinsic clean-prompt relative-variation, q0.95 of
          (||h_i - h_j|| / ||h_j||) over clean prompt pairs   # option (ii)
        rationale: steering quieter than natural inter-clean-prompt variation is silent
        source: model-intrinsic, measured on clean set (not an advisor number)
        fallback_ceiling: 0.20   # advisor band top 0.15-0.20, used as a documented
                                 # conservative REAL ceiling when the preferred reference
                                 # is absent or degenerate (zero-effect baseline passed)
      kl_max:
        preferred: q0.95 of KL(base || benign-perturbation) on negctrl
          (clean paraphrase / temperature jitter)               # option (ii)-analog
        rationale: off-target drift we ALREADY accept from a benign perturbation
        source: measured null distribution (not an advisor number)
        fallback_ceiling: 1.5    # advisor off-target-damage band, documented real ceiling
      degeneracy_guard:
        rule: if a delta reference q0.95 <= 1e-6 (zero-effect baseline signature),
          fall back to fallback_ceiling, NEVER return 0.
        regression_selftest: onto_e13_sensors._selftest covers the all-zeros input case
        permanent_design_rule: delta-metric thresholds reference acceptable-effect, never
          the zero baseline -- applies to ALL future steering sensors, not just E14.
      caller_contract_TYPE_C: >
        sensor_pass currently feeds the alpha=0 baseline into calibration; with the guard
        that degrades cleanly to the fallback ceiling (no abort-everything). To use the
        PREFERRED empirical reference, the TYPE C caller feeds clean-pair distortion into
        distortion_clean and benign-perturbation KL into kl_negctrl. ONE-LINE caller change,
        deferred to the E14 run session (run.py edited there, NOT in this TYPE A session).
  auto_judge:
    candidate: onto_e13_probe.py       # component (d) - CANDIDATE track only
    earning_rule: >
      must retrospectively reproduce E11 AND E12 manual verdicts before ANY gate
      role. v36 selftest result earned_gate_role=False. Reports numbers only.
    binding: manual scan remains the E13 verdict instrument regardless.

data:
  eval_frozen:
    heldout: data/heldout_v1.3.jsonl   # n=36, FROZEN
    bait: data/bait_v2_n32.jsonl       # frozen file n=32; falsifier denominator = 31
                                       # per committed E9-E12 manual-scan convention
  vfab_training:
    source: FRESH HARVEST ONLY via onto_e12_harvest.py (NEW prompts/entities)
    sidecar_required: entity_collision_gate_passed=true (else onto_e13_vfab aborts)
    held_back_family: fabricated_provenance   # EXCLUDED from training by construction
  contamination_rule: bait/heldout NEVER in any training or calibration path.
    Probe trains on PAST EMISSIONS (outputs_E10/E11 C-arm), never re-fed eval prompts.
  probe_judge_candidate:
    train: outputs_E10.json + outputs_E11.json C-arms + manual fab/clean labels
    test_heldout_session: outputs_E12.json C-arm + bait_manual_verdict_E12
    labels: >
      machine-readable JSON sidecar mapping bait_id -> fab|clean, built from manual
      verdicts (prose .md is not a label source)

arms:                                  # 4-arm generation, greedy, NF4, frozen suite
  A: base bare
  B: base + GOLD prompt
  C: adapter_E12_dpo_68 + logit_gate ON + V_fab steer ON   # verdict arm
  D: adapter_E12_dpo_68, constraints OFF                    # attribution arm

privacy:
  local_only: [outputs_*, "*report*", leak_report_*, bait_spotcheck*, activations,
               vectors, probe artifacts]   # -> _local\ (gitignored)
  public_git: [scripts, this recipe, manual verdicts, gate/train logs,
               negative-result reports]
  never_public: [weights, bait-sets, held-out, GOLD/corpora]

# ============================ FALSIFIER - IMMUTABLE ============================
# Verbatim commitment (00_SESSION_PACK v35->v37 chain). No edits after commit.
falsifier:
  pass_requires_ALL:
    - manual bait_fab(C) == 0/31
    - composite(C) >= 5.5
    - negctrl no regression from 0%
    - "cross-class clause: V_fab suppresses the held-back fabricated_provenance family it never trained on"
  auto_verdict: IGNORED
  verdict_instrument: manual locator-spectrum scan (regex spectrum + full read)
  what_would_falsify_component_b: no suppression of the unseen held-back family
    (=> class-memorization, not a fabrication direction)
# ===============================================================================
