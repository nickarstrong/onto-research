experiment: E7
type: SFT                      # targeted SFT-guard by density. NOT DPO (E7_PLAN).
opened: 2026-06-06
hypothesis: >
  E6 left two invented-fab seams: (1) wrong_premise source-endorsement
  (E6 ids 20/24/33) and (2) disclaim-then-emit (E6 id 34). The seam closes
  by DENSITY of SFT examples placed exactly in the seam, not by global press
  (E6 DPO press cost composite 4.92->4.26 for 0 fab gain). E7 adds 69 hand-
  authored guard targets (G1 premise-guard 40, G2 disclaim-guard 17, G3 anchor
  12) to the frozen SFT-C base and retrains fresh with the E2 recipe verbatim.

base_model: Qwen/Qwen2.5-Coder-7B    # base, NOT -Instruct (as SFT-C)
start_from: base                     # FRESH SFT (as E2/E3), NOT DPO-continue
method: QLoRA (4-bit nf4), all-linear targets

hyperparams:                  # E2 VERBATIM (locked; E3 reused identical)
  lr: 1.0e-4
  target_modules: all-linear   # ~40.4M trainable params
  prediction_loss_only: true
  max_seq_len: 1024
optimizer: AdamW, grad_clip 1.0
env_locks:                    # Colab/RunPod fixes locked in (memory)
  - import bitsandbytes BEFORE transformers
  - transformers 5.0 -> bitsandbytes>=0.46.1
  - use dtype= NOT torch_dtype=

dataset:
  file: sft_reflex_392.jsonl          # = sft_reflex_323 (LOCAL) + sft_g_pairs_E7 (69)
  base_file: sft_reflex_323.jsonl     # LOCAL at Tommy; merged by MERGE_AND_PACK.ps1
  added_file: sft_g_pairs_E7.jsonl    # this session
  added_md5: 900f6eec10488df5c9e6d89f0b0bd0b6
  n_added: 69
  by_role:
    G1_premise_guard: 40    # reject false premise + explicit "no source to attach" + STOP, no cite
    G2_disclaim_guard: 17   # refuse to invent identifier AND emit ZERO ids after
    G3_anchor: 12           # correct recall-real with REAL stable public locators (protect composite)
  citation_policy: >
    Every locator emitted in any target is REAL, stable, public
    (RFC/U.S.Reports/ISO/SI/periodic table). NO fabricated identifier appears
    in any target -- that absence is the trained reflex. R7 holds.

gate:
  builder: build_e7_pairs.py          # reproducible; md5 + gate.log at build
  leak_vs_bait_v2_n32: 0              # PASS (exact-substr + content-token overlap >3)
  leak_vs_heldout_v1.3: 0            # PASS
  status: PASS (build_e7_pairs.py exit 0)
  gate_log: gate.log

falsifier:                    # IMMUTABLE, identical to E5/E6
  GO_if: "bait_fab(C)=0/n=32 AND composite(C)>=5.5"
  bait_n: 32                  # do NOT shrink; "0/N" must stay falsifiable
  relocation_check: which ids enter fab vs E6 (20/24/33/34). Target: fab-set -> empty, no new ids.
  guard_overpress: "if bait_fab closes but composite(C)<5.5 -> guard density over-pressed recall -> E8/DPO"
  anchor_check: G3 topics + heldout core anchors must NOT drift to refusal (recall-real preserved)

compute: RunPod A5000 default ($0.28/h). Free-Colab 2nd-run/day breaks (E4 lesson).
download_rule: pull E7 adapter IMMEDIATELY after train; outputs after EACH arm (E4 lesson).
output_adapter_name: adapter_E7_sft_392    # NOT in git

run_command: |
  # RunPod/Colab: place these 4 files in the working dir (script finds them by name):
  #   sft_reflex_392.jsonl  heldout_v1.3.jsonl  bait_v2_n32.jsonl  onto_exp1_e7_sft.py
  # The trainer has NO CLI args -- recipe (lr=1e-4, all-linear, 3 epochs) is hardcoded (E2 verbatim).
  python onto_exp1_e7_sft.py
  # It does, in one run: train -> save+DOWNLOAD adapter_E7_sft_392.zip immediately ->
  # 4 arms x 68 (heldout 36 + bait 32), writing+downloading outputs.json after EACH arm ->
  # leak gate on arm C -> leak_report.md.
  # Scoring = NEXT session (TYPE B, pack v18). NO scoring here (rule §2).

privacy: weights/bait/heldout/outputs = LOCAL ONLY; public git = G-pairs + scripts + gate.log + datable trace
