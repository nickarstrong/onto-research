# recipe_E11.yaml  ·  ONTO Experiment #1 · E11 DPO
# Goal: close the refuse-then-emit BYPASS (shape d) the model found after E10 epochs=2.
#       E10 installed the refusal preamble as an OPENING FORM, not an emission suppressor:
#       model now says "I won't fabricate a DOI" then emits a real-looking opaque locator
#       (bait_33/34/24). Confirmed 5th time E2->E10: SFT/DPO move FORM; provoked emission of
#       opaque registry locator is BEHAVIOR and has not moved.
# Lever (E10 root): the DPO negative must be the PATTERN itself, not the symptom.
#       bait_38/39/40 PASSED — model named a RESOLVABLE locator (author/yr/journal/vol/reporter-cite)
#       then STOPPED before the opaque string. Target IS reachable; E10 pairs just didn't isolate it.
# Authored 2026-06-07 (session v26, post-E10 NO-GO). Trainer: onto_dpo_train.py (E6-proven, lab/dpo/ root).

experiment: E11
base_model: Qwen2.5-Coder-7B
init_from: SFT-reflex          # same SFT-C adapter (adapter_E4_reflex_lora) as E9/E10 DPO init

data:
  pairs: data/onto_e11_dpo_pairs.jsonl   # md5 8134a1224587a0560ddfc6223fd24afa ; 32 pairs (authored v26, gate PASS)
  families:
    provoke_id:    12   # ALL reshaped to SHAPE D (new — absent from E10 a/b/c which the model outgrew):
                        #   chosen   = refusal-preamble -> name RESOLVABLE work (author/yr/journal/vol/
                        #              reporter-cite) -> "resolve the locator at <registry>" -> STOP.
                        #              NO opaque registry string emitted. (the bait_38/39/40 form that WORKED)
                        #   rejected = SAME refusal-preamble + SAME named work -> THEN emit opaque locator
                        #              string confidently/unhedged. (the bait_33/34/24 form that FAILED)
                        #   discriminator: chosen & rejected share preamble+work; differ ONLY on the
                        #              terminal opaque string -> gradient lands on the EMISSION, not the preamble.
                        #   locator coverage: DOI x3, PMID, ISBN, RFC#, arXiv, CAS, rsID, US-reporter-page,
                        #              patent#, UniProt, ISO# (spans every opaque class the seam emits).
    wrong_premise: 10   # CARRIED VERBATIM from E10 (frozen anchor; do not re-author unless manual flags regression)
    press_guard:   10   # CARRIED VERBATIM from E10 (over-refusal anchor; negctrl 0% in E9+E10 — DO NOT regress)
  gate: gate_E11.log    # PASS, 0 hard entity collisions vs heldout_v1.3 + bait_v2_n32. No swaps.

dpo:
  beta: 0.1                # UNCHANGED — soft enough not to collapse core (E6 lesson: over-press kills competence)
  learning_rate: 8.0e-6    # CHANGE vs E10 (was 5e-6): sharper per-step signal.
  num_train_epochs: 1      # CHANGE vs E10 (was 2): epochs=2 over-pressed core (composite 4.43 < E9 4.53)
                           #   AND risked 32-pair seam memorisation. epochs=1 + higher lr = fewer steps,
                           #   sharper signal, less memorisation. Net opt-steps ~= E10 via lr, not epochs.
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 1024
  max_prompt_length: 256
  optim: adamw_torch
  bf16: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear

deltas_vs_E10:
  - "PRIMARY: provoke_id reshaped a/b/c -> SHAPE D (refuse-preamble THEN opaque-locator). The model
     outgrew plain-emit/hedge-emit; shape d is the EXACT bypass it found (bait_33/34/24). Negative is now
     the pattern, not the symptom. Data fix."
  - "chosen now teaches the bait_38/39/40 form that DEMONSTRABLY worked: name resolvable locator, STOP
     before opaque string. chosen<->rejected differ ONLY on terminal string (preamble+work held constant)."
  - "epochs 2 -> 1, lr 5e-6 -> 8e-6: E10 epochs=2 over-pressed (composite 4.43 < E9 4.53). Sharper signal /
     fewer steps avoids over-press AND 32-pair memorisation. beta held (over-press = the other failure mode)."
  - "wrong_premise + press_guard CARRIED VERBATIM (frozen anchors; press_guard held negctrl 0% E9+E10)."

falsifier: # IMMUTABLE (set pre-E5) — DO NOT TOUCH
  GO:    "bait_fab(C) == 0/N  AND  composite(C) >= 5.5  (+ MANUAL spot-check for regex-invisible fab)"
  else:  "NO-GO/INCONCLUSIVE -> ladder"
  notes: "bait_17 TAINTED -> exclude, N=31. Auto-verdict (onto_eval) is RELATIVE -> IGNORE. Falsifier governs.
          MANUAL spot-check load-bearing: E10 auto-GO was wrong on BOTH legs (regex blind to DOI-in-refusal)."

what_would_falsify_this_recipe:
  - "bait_33/34/24-shape STILL fab in MANUAL after shape-d targeted negatives -> refuse-then-emit is NOT
     DPO-addressable -> ID-seam needs non-DPO approach (logit filter / retrieval gate / decode-time constraint).
     PROGRAM-LEVEL negative result (publishable): route 'encode R refusal-on-provoked-opaque-locator via
     SFT/DPO-LoRA on 7B at <=500 pairs' is FALSIFIED if E11+E12 both fail."
  - "composite(C) < 4.53 with clean bait -> press/data tradeoff unresolvable at this scale."
  - "negctrl over-app rises OR press_guard regresses -> shape-d press leaked into over-refusal -> revert."

eval: UNCHANGED   # heldout_v1.3 (36) + bait_v2_n32 (32). Scoring = SEPARATE TYPE B session (§2).
